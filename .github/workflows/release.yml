name: Release (Linux, macOS, Windows)
permissions:
  contents: write
  actions: write

concurrency:
  group: release
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'reason'
        required: false
  push:
    tags:
      - '*'
      - '!*-*'

jobs:
  prepare_release:
    name: Prepare Release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Determine next version
        id: version
        run: |
          git fetch --tags --force
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)
          if [[ -z "$LATEST_TAG" ]]; then
            VERSION="v0.0.1"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST_TAG#v}"
            VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag '$VERSION' already exists"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Prepared version: $VERSION"
      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "refs/tags/${{ steps.version.outputs.version }}"

  linux:
    name: Linux Release
    runs-on: ubuntu-latest
    needs: [prepare_release]
    if: always() && (startsWith(github.ref, 'refs/tags/') || needs.prepare_release.result == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Determine Version
        run: |
          VERSION="${{ needs.prepare_release.outputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Only stable tags like v0.10.8 are supported for release builds"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.2.22
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Build Frontend (classic)
        env:
          CI: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd web/classic
          bun install
          VITE_REACT_APP_VERSION=$VERSION node node_modules/vite/bin/vite.js build
          cd ../..
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '>=1.25.1'
      - name: Build Backend (amd64)
        run: |
          go mod download
          mkdir -p dist/linux_amd64
          go build -ldflags "-s -w -X 'new-api/common.Version=$VERSION' -extldflags '-static'" -o dist/linux_amd64/new-api
      - name: Build Backend (arm64)
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p dist/linux_arm64
          CC=aarch64-linux-gnu-gcc CGO_ENABLED=1 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X 'new-api/common.Version=$VERSION' -extldflags '-static'" -o dist/linux_arm64/new-api
      - name: Package archives
        run: |
          tar -czf new_api_lite_linux_amd64.tar.gz -C dist/linux_amd64 new-api
          tar -czf new_api_lite_linux_arm64.tar.gz -C dist/linux_arm64 new-api
      - name: Generate checksums
        run: sha256sum new_api_lite_linux_*.tar.gz > checksums-linux.txt

      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            new_api_lite_linux_*.tar.gz
            checksums-linux.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos:
    name: macOS Release
    runs-on: macos-latest
    needs: [prepare_release, linux]
    if: always() && needs.linux.result == 'success' && (startsWith(github.ref, 'refs/tags/') || needs.prepare_release.result == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Determine Version
        run: |
          VERSION="${{ needs.prepare_release.outputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Only stable tags like v0.10.8 are supported for release builds"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.2.22
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Build Frontend (classic)
        env:
          CI: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd web/classic
          bun install
          VITE_REACT_APP_VERSION=$VERSION node node_modules/vite/bin/vite.js build
          cd ../..
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '>=1.25.1'
      - name: Build Backend
        run: |
          go mod download
          mkdir -p dist/darwin_amd64
          go build -ldflags "-X 'new-api/common.Version=$VERSION'" -o dist/darwin_amd64/new-api
      - name: Package archive
        run: tar -czf new_api_lite_darwin_amd64.tar.gz -C dist/darwin_amd64 new-api
      - name: Generate checksums
        run: shasum -a 256 new_api_lite_darwin_amd64.tar.gz > checksums-macos.txt

      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            new_api_lite_darwin_amd64.tar.gz
            checksums-macos.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    name: Windows Release
    runs-on: windows-latest
    needs: [prepare_release, macos]
    if: always() && needs.macos.result == 'success' && (startsWith(github.ref, 'refs/tags/') || needs.prepare_release.result == 'success')
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Determine Version
        run: |
          VERSION="${{ needs.prepare_release.outputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Only stable tags like v0.10.8 are supported for release builds"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.2.22
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Build Frontend (classic)
        env:
          CI: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd web/classic
          bun install
          VITE_REACT_APP_VERSION=$VERSION node node_modules/vite/bin/vite.js build
          cd ../..
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '>=1.25.1'
      - name: Build Backend
        run: |
          go mod download
          mkdir -p dist/windows_amd64
          go build -ldflags "-s -w -X 'new-api/common.Version=$VERSION'" -o dist/windows_amd64/new-api.exe
      - name: Package archive
        run: tar -czf new_api_lite_windows_amd64.tar.gz -C dist/windows_amd64 new-api.exe
      - name: Generate checksums
        run: sha256sum new_api_lite_windows_amd64.tar.gz > checksums-windows.txt

      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            new_api_lite_windows_amd64.tar.gz
            checksums-windows.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger_docker:
    name: Trigger Docker Build
    runs-on: ubuntu-latest
    needs: [prepare_release, linux, macos, windows]
    if: always() && github.event_name == 'workflow_dispatch' && needs.prepare_release.result == 'success' && needs.linux.result == 'success' && needs.macos.result == 'success' && needs.windows.result == 'success'
    steps:
      - name: Trigger docker-build workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare_release.outputs.version }}
        run: gh workflow run docker-build.yml --repo "$GITHUB_REPOSITORY" --ref "$GITHUB_REF_NAME" -f tag="$VERSION"
